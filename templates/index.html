<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TokenTally</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script type="module" src="https://cdn.jsdelivr.net/gh/starfederation/datastar@v1.0.0-RC.6/bundles/datastar.js"></script>
</head>
<body data-signals="{
  refreshing: false,
  showReportgithubcopilot: false,
  showReportcursor: false,
  showReportchatgptplus: false,
  showReportclaudepro: false,
  showReportgeminiconsumer: false,
  showImportgithubcopilot: false,
  showImportcursor: false,
  showImportchatgptplus: false,
  showImportclaudepro: false
}">

  <header class="app-header">
    <div class="header-content">
      <h1 class="app-title">TokenTally</h1>
      <p class="app-subtitle">AI Subscription Usage Dashboard</p>
    </div>
    <div class="header-actions">
      <button class="btn btn-primary btn-refresh-all"
              data-on:click="@get('/sse/refresh_all')"
              data-indicator:refreshing>
        <span data-show="!$refreshing">Refresh All</span>
        <span data-show="$refreshing">Refreshing...</span>
      </button>
    </div>
  </header>

  <main class="dashboard">
    <section class="cards-grid">
      {{ cards_html }}
    </section>

    <section class="activity-section">
      <h2 class="section-title">Activity Log</h2>
      <div id="activity-log" class="activity-log">
        <div class="log-entry">
          <span class="log-time">--:--:--</span>
          <span class="log-msg">Dashboard loaded. Use Refresh All or per-provider buttons above.</span>
        </div>
      </div>
    </section>
  </main>

  <footer class="app-footer">
    <p>TokenTally MVP &mdash; Local-first AI subscription tracker</p>
  </footer>

</body>
</html>
